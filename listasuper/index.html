<head>
<meta charset="UTF-8">

<title>🛒 ListaSuper</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f3ef;--white:#fff;--border:#e5e2da;--border2:#ccc9c0;--green:#2d6a4f;--gm:#52b788;--gl:#eaf4ee;--gb:#95d5b2;--text:#1a1a18;--text2:#4a4844;--muted:#9a9590;--shadow:0 1px 4px rgba(0,0,0,.08);--shadow-lg:0 8px 32px rgba(0,0,0,.14)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);max-width:480px;margin:0 auto;min-height:100vh}
.hdr{position:sticky;top:0;z-index:100;background:var(--white);border-bottom:1px solid var(--border);padding:14px 18px 10px;box-shadow:var(--shadow)}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.logo{font-weight:900;font-size:22px;color:var(--green);letter-spacing:-.5px}
.logo em{color:var(--text2);font-weight:600;font-style:normal}
.sub{font-size:11px;color:var(--muted);margin-top:1px;display:flex;align-items:center;gap:5px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0}
.dot.ok{background:var(--green);box-shadow:0 0 5px var(--gm)}
.hdr-btns{display:flex;gap:8px}
.ibtn{width:38px;height:38px;border-radius:12px;border:1.5px solid var(--gb);background:var(--gl);color:var(--green);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ibtn.on{background:var(--green);color:#fff;border-color:var(--green)}
.prog{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.prog-track{flex:1;height:7px;background:var(--border);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gm),var(--green));border-radius:4px;transition:width .5s}
.prog-pct{font-size:12px;color:var(--muted);font-weight:800;min-width:32px;text-align:right}
.tabs{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:5px 11px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid transparent;background:#eee9e0;color:var(--muted);white-space:nowrap;font-family:'Nunito',sans-serif}
.tab.on{background:var(--gl);border-color:var(--gb);color:var(--green)}
.add{background:var(--white);border-bottom:1px solid var(--border);padding:12px 18px;display:flex;gap:8px}
.add input{flex:1;background:var(--bg);border:1.5px solid var(--border2);color:var(--text);font-family:'Nunito',sans-serif;font-size:14px;padding:9px 13px;border-radius:12px;outline:none}
.add input:focus{border-color:var(--green)}
.add select{background:var(--bg);border:1.5px solid var(--border2);color:var(--text2);font-family:'Nunito',sans-serif;font-size:12px;padding:9px 6px;border-radius:12px;outline:none;max-width:108px}
.add-btn{background:var(--green);color:#fff;border:none;font-weight:900;font-size:22px;width:42px;height:42px;border-radius:12px;cursor:pointer;flex-shrink:0;font-family:'Nunito',sans-serif}
.list{padding:14px 18px 160px}
.cblock{margin-bottom:16px}
.chdr{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;border-radius:10px;margin-bottom:7px;cursor:pointer;border:1px solid}
.clbl{display:flex;align-items:center;gap:7px;font-weight:800;font-size:11px;text-transform:uppercase;letter-spacing:.07em}
.cbadge{font-size:10px;font-weight:800;padding:1px 7px;border-radius:20px;background:#fff}
.carr{font-size:11px;opacity:.5;transition:transform .2s}
.cblock.col .carr{transform:rotate(-90deg)}
.cblock.col .citems{display:none}
.citems{display:flex;flex-direction:column;gap:5px}
.item{display:flex;align-items:center;gap:11px;background:var(--white);border:1px solid var(--border);border-radius:13px;padding:11px 13px;box-shadow:var(--shadow)}
.item.done{opacity:.42;box-shadow:none;border-color:transparent;background:var(--bg)}
.item.done .iname{text-decoration:line-through;color:var(--muted)}
.chk{width:22px;height:22px;border-radius:50%;border:2px solid var(--border2);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:900;color:#fff}
.item.done .chk{background:var(--gm);border-color:var(--gm)}
.iinfo{flex:1;min-width:0}
.iname{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.iprices{display:flex;gap:4px;margin-top:4px}
.ptag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;background:#e8f1fb;color:#1a5fa8;border:1px solid #7ab3e8}
.idel{background:none;border:none;color:var(--border2);cursor:pointer;font-size:14px;padding:3px 5px;line-height:1}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:70;opacity:0;pointer-events:none;transition:opacity .3s}
.overlay.on{opacity:1;pointer-events:all}
.panel{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:480px;background:var(--white);border-radius:22px 22px 0 0;padding:14px 18px 48px;z-index:80;max-height:86vh;overflow-y:auto;box-shadow:var(--shadow-lg);transition:transform .3s cubic-bezier(.32,.72,0,1)}
.panel.on{transform:translateX(-50%) translateY(0)}
.drag{width:38px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.pttl{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.pttl h2{font-weight:900;font-size:17px}
.px{background:var(--bg);border:1px solid var(--border);color:var(--muted);width:30px;height:30px;border-radius:50%;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ptabs{display:flex;background:var(--bg);border-radius:12px;padding:4px;gap:4px;margin-bottom:16px}
.ptab{flex:1;padding:8px;border-radius:9px;border:none;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;background:transparent;color:var(--muted)}
.ptab.on{background:var(--white);color:var(--green);box-shadow:var(--shadow)}
.scan-btn{width:100%;background:var(--green);color:#fff;border:none;font-family:'Nunito',sans-serif;font-weight:900;font-size:15px;padding:14px;border-radius:13px;cursor:pointer;margin-top:4px}
.scan-btn:disabled{background:var(--border2);color:var(--muted);cursor:not-allowed}
.sp{background:var(--gl);border:1px solid var(--gb);border-radius:10px;padding:10px 14px;margin-bottom:12px;display:none}
.sp.on{display:block}
.sp-track{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:6px}
.sp-fill{height:100%;background:linear-gradient(90deg,var(--gm),var(--green));border-radius:3px;transition:width .3s}
.sp-lbl{font-size:12px;color:var(--green);font-weight:700}
.total{background:linear-gradient(135deg,var(--gl),#d0edd8);border:1.5px solid var(--gb);border-radius:14px;padding:14px 16px;margin-bottom:14px;display:none;justify-content:space-between;align-items:center}
.total.on{display:flex}
.total-lbl{font-size:12px;color:var(--green);font-weight:700}
.total-sub{font-size:11px;color:var(--gm);margin-top:2px}
.total-amt{font-weight:900;font-size:26px;color:var(--green)}
.rrow{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:9px 12px;margin-bottom:4px}
.rname{flex:1;font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text2)}
.bot{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--white);border-top:1px solid var(--border);padding:11px 18px 28px;display:flex;gap:10px;z-index:50}
.bbtn{flex:1;padding:12px 8px;border-radius:12px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border:1.5px solid var(--border2);background:var(--bg);color:var(--text2)}
.bbtn.p{background:var(--green);border-color:var(--green);color:#fff}
.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-70px);background:var(--text);color:#fff;font-size:13px;font-weight:700;padding:10px 18px;border-radius:100px;z-index:999;transition:transform .3s;white-space:nowrap;pointer-events:none}
.toast.on{transform:translateX(-50%) translateY(0)}
.cc-CONGELADOS{background:#e8f4fd;border-color:#bbdefb;color:#1565c0}.cc-CONGELADOS .cbadge{color:#1565c0}
.cc-ALACENA{background:#fff8e1;border-color:#ffe082;color:#e65100}.cc-ALACENA .cbadge{color:#e65100}
.cc-LÁCTEOS{background:#fce4ec;border-color:#f8bbd0;color:#880e4f}.cc-LÁCTEOS .cbadge{color:#880e4f}
.cc-PANADERÍA{background:#fff3e0;border-color:#ffcc80;color:#bf360c}.cc-PANADERÍA .cbadge{color:#bf360c}
.cc-CARNICERÍA{background:#fbe9e7;border-color:#ffab91;color:#b71c1c}.cc-CARNICERÍA .cbadge{color:#b71c1c}
.cc-VERDULERÍA{background:#e8f5e9;border-color:#a5d6a7;color:#1b5e20}.cc-VERDULERÍA .cbadge{color:#1b5e20}
.cc-HIGIENE{background:#f3e5f5;border-color:#ce93d8;color:#4a148c}.cc-HIGIENE .cbadge{color:#4a148c}
.cc-LIMPIEZA{background:#e0f2f1;border-color:#80cbc4;color:#004d40}.cc-LIMPIEZA .cbadge{color:#004d40}
.cc-PAPELERÍA{background:#f5f5f5;border-color:#e0e0e0;color:#424242}.cc-PAPELERÍA .cbadge{color:#424242}
.cc-DIETÉTICA{background:#f9fbe7;border-color:#dce775;color:#558b2f}.cc-DIETÉTICA .cbadge{color:#558b2f}
.cc-BAZAR{background:#ede7f6;border-color:#b39ddb;color:#311b92}.cc-BAZAR .cbadge{color:#311b92}
.cc-OTROS{background:#efebe9;border-color:#bcaaa4;color:#4e342e}.cc-OTROS .cbadge{color:#4e342e}

</head>

<div class="hdr">
  <div class="hdr-top">
    <div>
      <div class="logo">🛒 Lista<em>Super</em></div>
      <div class="sub"><div class="dot" id="dot"></div><span id="subTxt">Cargando...</span></div>
    </div>
    <div class="hdr-btns">
      <button class="ibtn" id="pbtn" onclick="openPanel()">💰</button>
      <button class="ibtn" onclick="doShare()">🔗</button>
    </div>
  </div>
  <div class="prog"><div class="prog-track"><div class="prog-fill" id="pf" style="width:0%"></div></div><div class="prog-pct" id="pp">0%</div></div>
  <div class="tabs" id="tabs"></div>
</div>
<div class="add">
  <input id="inp" type="text" placeholder="Agregar producto..." autocorrect="on" autocapitalize="sentences">
  <select id="catsel">
    <option value="CONGELADOS">🧊 Congelados</option>
    <option value="ALACENA">🥫 Alacena</option>
    <option value="LÁCTEOS">🥛 Lácteos</option>
    <option value="PANADERÍA">🍞 Panadería</option>
    <option value="CARNICERÍA">🥩 Carnicería</option>
    <option value="VERDULERÍA">🥕 Verdulería</option>
    <option value="HIGIENE">🧴 Higiene</option>
    <option value="LIMPIEZA">🧽 Limpieza</option>
    <option value="PAPELERÍA">📦 Papelería</option>
    <option value="DIETÉTICA">🥜 Dietética</option>
    <option value="BAZAR">🍳 Bazar</option>
    <option value="OTROS">🏷️ Otros</option>
  </select>
  <button class="add-btn" onclick="addItem()">+</button>
</div>
<div class="list" id="list"></div>
<div class="overlay" id="ov" onclick="closePanel()"></div>
<div class="panel" id="panel">
  <div class="drag"></div>
  <div class="pttl"><h2>💰 Precios</h2><button class="px" onclick="closePanel()">✕</button></div>
  <div class="ptabs">
    <button class="ptab on" id="pt-cfg" onclick="setPTab('cfg')">⚙️ Configurar</button>
    <button class="ptab" id="pt-res" onclick="setPTab('res')">📊 Resultados</button>
  </div>
  <div id="pv-cfg">
    <div class="sp" id="sp"><div class="sp-lbl" id="spLbl">Consultando...</div><div class="sp-track"><div class="sp-fill" id="spBar" style="width:0%"></div></div></div>
    <div style="background:#e8f1fb;border:1.5px solid #7ab3e8;border-radius:13px;padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;gap:12px">
      <span style="font-size:22px">🤖</span>
      <div><div style="font-weight:800;font-size:14px;color:#1a5fa8">Estimación de precios</div><div style="font-size:11px;color:var(--muted);margin-top:1px">Precios de referencia de supermercados argentinos 2025</div></div>
    </div>
    <button class="scan-btn" id="scanBtn" onclick="scanAll()">🔍 Escanear toda la lista</button>
  </div>
  <div id="pv-res" style="display:none">
    <div class="total" id="totalBox"><div><div class="total-lbl">Total estimado</div><div class="total-sub" id="totalSub"></div></div><div class="total-amt" id="totalAmt">$0</div></div>
    <div id="resList"></div>
    <div id="resEmpty" style="text-align:center;padding:40px;color:var(--muted)"><div style="font-size:36px;margin-bottom:10px">🔍</div><div style="font-weight:700">Sin resultados</div><div style="font-size:12px;margin-top:6px">Tocá Configurar → Escanear</div></div>
  </div>
</div>
<div class="bot" id="bot">
  <button class="bbtn" onclick="clearChecked()">🗑 Borrar tachados</button>
  <button class="bbtn p" onclick="openPanel()">💰 Ver precios</button>
</div>
<div class="toast" id="toast"></div>

// ── STATE ──
let items = {}, prices = {}, col = new Set(), tab = 'TODOS', ptab = 'cfg';
let fbItems, fbPrices, fbConnected = false;

// ── PASO 1: Cargar lista local inmediatamente ──
function loadLocal() {
  try {
    const s = localStorage.getItem('ls5');
    if (s) { items = JSON.parse(s); return; }
  } catch(e) {}
  // Primera vez: cargar lista inicial
  INITIAL.forEach((d,i) => { items['i'+i] = {name:d.n, cat:d.c, checked:!!d.ch, ts:i}; });
}

loadLocal();
render(); // Mostrar lista inmediatamente

// ── PASO 2: Conectar Firebase en segundo plano ──
try {
  const fbApp = initializeApp(FB);
  const db = getDatabase(fbApp);
  fbItems = ref(db, 'items');
  fbPrices = ref(db, 'prices');

  onValue(fbItems, snap => {
    const data = snap.val();
    if (data && Object.keys(data).length > 0) {
      // Firebase tiene datos — usar esos
      items = data;
    } else {
      // Firebase vacío — subir lista local
      set(fbItems, items);
    }
    fbConnected = true;
    document.getElementById('dot').className = 'dot ok';
    document.getElementById('subTxt').textContent = 'Sincronizado en tiempo real ✓';
    render();
  });

  onValue(fbPrices, snap => {
    const data = snap.val();
    if (data) { prices = data; renderResults(); }
  });
} catch(e) {
  document.getElementById('subTxt').textContent = 'Sin sincronización';
}

function saveItems() {
  localStorage.setItem('ls5', JSON.stringify(items));
  if (fbItems) set(fbItems, items).catch(()=>{});
}
function savePrices() {
  if (fbPrices) set(fbPrices, prices).catch(()=>{});
}

// ── RENDER ──
function render() {
  const ids = Object.keys(items);
  const done = ids.filter(id => items[id] && items[id].checked).length;
  const total = ids.length;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('pf').style.width = pct+'%';
  document.getElementById('pp').textContent = pct+'%';
  if (fbConnected) document.getElementById('subTxt').textContent = done+' de '+total+' comprados';
  renderTabs(ids);
  renderList(ids);
}

function renderTabs(ids) {
  const cats = new Set(ids.map(id => items[id] && items[id].cat || 'OTROS'));
  const all = ['TODOS', ...CAT_ORDER.filter(c => cats.has(c))];
  document.getElementById('tabs').innerHTML = all.map(t =>
    '<button class="tab'+(t===tab?' on':'')+'" onclick="setTab(\''+t+'\')">'+(t==='TODOS'?'🛒 Todo':(CATS[t]||'📦')+' '+t)+'</button>'
  ).join('');
}

function renderList(ids) {
  const filt = ids.filter(id => items[id] && (tab==='TODOS' || items[id].cat===tab));
  const bycat = {};
  filt.forEach(id => { const c=items[id].cat||'OTROS'; (bycat[c]=bycat[c]||[]).push(id); });
  if (!filt.length) { document.getElementById('list').innerHTML='<div class="empty"><div style="font-size:44px;margin-bottom:12px">✅</div><div style="font-weight:700">Lista vacía</div></div>'; return; }
  const sorted = CAT_ORDER.filter(c => bycat[c]);
  document.getElementById('list').innerHTML = sorted.map(cat => {
    const cids = bycat[cat].sort((a,b)=>(items[a].ts||0)-(items[b].ts||0));
    const pend = cids.filter(id=>!items[id].checked).length;
    const isCol = col.has(cat);
    const cc = cat.replace(/[^A-Za-z]/g,'');
    return '<div class="cblock'+(isCol?' col':'')+'" id="cb_'+cc+'">' +
      '<div class="chdr cc-'+cc+'" onclick="togCat(\''+cat+'\')"><div class="clbl">'+(CATS[cat]||'📦')+' '+cat+'<span class="cbadge">'+pend+'/'+cids.length+'</span></div><span class="carr">▾</span></div>' +
      '<div class="citems">'+cids.map(renderItem).join('')+'</div></div>';
  }).join('');
}

function renderItem(id) {
  const it = items[id]; if (!it) return '';
  const p = prices[id]||{};
  const pt = p.precio ? '<div class="iprices"><span class="ptag">🤖 $'+p.precio.toLocaleString('es-AR')+'</span></div>' : '';
  return '<div class="item'+(it.checked?' done':'')+'" id="it_'+id+'">' +
    '<div class="chk" onclick="togItem(\''+id+'\')">'+(it.checked?'✓':'')+'</div>' +
    '<div class="iinfo"><div class="iname">'+esc(it.name)+'</div>'+pt+'</div>' +
    '<button class="idel" onclick="delItem(\''+id+'\')">✕</button></div>';
}

function renderResults() {
  const withP = Object.entries(prices).filter(([id,p])=>items[id]&&p.precio);
  const empty = document.getElementById('resEmpty');
  const list = document.getElementById('resList');
  const box = document.getElementById('totalBox');
  if (!withP.length) { empty.style.display=''; list.innerHTML=''; box.classList.remove('on'); return; }
  empty.style.display = 'none';
  const tot = withP.reduce((s,[,p])=>s+(p.precio||0),0);
  box.classList.add('on');
  document.getElementById('totalAmt').textContent = '$'+Math.round(tot).toLocaleString('es-AR');
  document.getElementById('totalSub').textContent = withP.length+' ítems con precio';
  list.innerHTML = withP.map(([id,p])=>'<div class="rrow"><div class="rname">'+esc(items[id]?.name||'')+'</div><span class="ptag">🤖 $'+p.precio.toLocaleString('es-AR')+'</span></div>').join('');
}

// ── ACCIONES ──
window.addItem = () => {
  const inp = document.getElementById('inp'), name = inp.value.trim();
  if (!name) return;
  const id = 'i'+Date.now();
  items[id] = {name, cat:document.getElementById('catsel').value, checked:false, ts:Date.now()};
  saveItems(); render(); inp.value=''; inp.focus(); toast('Agregado ✓');
};
window.togItem = id => { if(!items[id])return; items[id].checked=!items[id].checked; saveItems(); render(); };
window.delItem = id => { delete items[id]; delete prices[id]; saveItems(); savePrices(); render(); };
window.clearChecked = () => {
  const ch = Object.keys(items).filter(id=>items[id]&&items[id].checked);
  if (!ch.length) { toast('No hay tachados'); return; }
  ch.forEach(id=>{delete items[id];delete prices[id];});
  saveItems(); savePrices(); render(); toast('Borrados '+ch.length+' ítems');
};
window.setTab = t => { tab=t; render(); };
window.togCat = cat => { col.has(cat)?col.delete(cat):col.add(cat); render(); };
window.openPanel = () => { document.getElementById('panel').classList.add('on'); document.getElementById('ov').classList.add('on'); document.getElementById('bot').style.display='none'; document.getElementById('pbtn').classList.add('on'); };
window.closePanel = () => { document.getElementById('panel').classList.remove('on'); document.getElementById('ov').classList.remove('on'); document.getElementById('bot').style.display='flex'; document.getElementById('pbtn').classList.remove('on'); };
window.setPTab = t => { ptab=t; ['cfg','res'].forEach(x=>{document.getElementById('pt-'+x).classList.toggle('on',x===t);document.getElementById('pv-'+x).style.display=x===t?'':'none';}); };

function estimarPrecio(name) {
  const q = name.toLowerCase();
  for (const [k,v] of Object.entries(PDB)) {
    if (q.includes(k) || k.split(' ').every(w=>q.includes(w.slice(0,4)))) {
      return Math.round(v*(0.90+Math.random()*0.20)/50)*50;
    }
  }
  return null;
}

window.scanAll = async () => {
  const btn = document.getElementById('scanBtn');
  if (btn.disabled) return;
  btn.disabled = true;
  document.getElementById('sp').classList.add('on');
  const ids = Object.keys(items);
  let done = 0;
  for (const id of ids) {
    const name = items[id]?.name; if (!name) continue;
    done++;
    document.getElementById('spLbl').textContent = done+'/'+ids.length+' · '+name.slice(0,25)+'...';
    document.getElementById('spBar').style.width = Math.round(done/ids.length*100)+'%';
    const p = estimarPrecio(name);
    if (p) prices[id] = {precio:p};
    await new Promise(r=>setTimeout(r,20));
  }
  savePrices();
  document.getElementById('sp').classList.remove('on');
  btn.disabled = false; btn.textContent = '🔄 Re-escanear';
  setPTab('res'); renderResults(); toast('✅ Precios listos');
};

window.doShare = () => {
  if (navigator.share) navigator.share({title:'Lista del super',url:location.href});
  else { navigator.clipboard?.writeText(location.href); toast('Link copiado 📋'); }
};
function toast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('on'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('on'),2400); }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
document.getElementById('inp').addEventListener('keydown', e=>{ if(e.key==='Enter') window.addItem(); });
